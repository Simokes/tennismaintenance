site_name: TennisMaintenance
site_description: Référentiel technique de maintenance de la structure tennis
site_url: https://simokes.github.io/tennismaintenance/
repo_url: https://github.com/Simokes/tennismaintenance
repo_name: Simokes/tennismaintenance
edit_uri: edit/main/docs/

plugins:
  - search:
      lang: fr

theme:
  name: material
  language: fr
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/print.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Sites:
      - Vue d'ensemble: sites/index.md
      - La Pastorale:
          - Présentation: sites/site-1/index.md
          - Terrain 1: terrains/T01.md
          - Terrain 2: terrains/T02.md
          - Terrain 3: terrains/T03.md
          - Terrain 4: terrains/T04.md
          - Terrain 5: terrains/T05.md
          - Terrain 6: terrains/T06.md
      - Le Kalisté:
          - Présentation: sites/site-2/index.md
          - Terrain 7 — Gazon synthétique: sites/site-2/T07.md
          - Terrain 8 — Gazon synthétique: sites/site-2/T08.md
          - Terrain 9 — Dur: sites/site-2/T09.md
          - Terrain 10 — Dur: sites/site-2/T10.md
          - Terrain 11 — Dur: sites/site-2/T11.md
  - Standards:
      - Vue d'ensemble: standards/index.md
      - Sortie terrain: standards/sortie-terrain.md
      - Sortie entretien: standards/sortie-entretien.md
      - Ensemble manuel: standards/ensemble-manuel.md
      - Buse cuivre: standards/buse-cuivre.md
  - Équipements:
      - Vue d'ensemble: equipment/index.md
  - Commande:
      - Vue d'ensemble: control/index.md
      - Programmateur Hunter ICC: control/programmateur-hunter-icc.md
  - Accès:
      - Vue d'ensemble: access/index.md
      - La Pastorale: access/controle-acces-site.md
      - Le Kalisté: access/controle-acces-kaliste.md
  - Procédures:
      - Vue d'ensemble: procedures/index.md
      - Terrain dur: procedures/terrain-dur.md
      - Gazon synthétique: procedures/gazon-synthetique.md
  - Inventaire:
      - Vue d'ensemble: inventory/index.md
  - Interventions:
      - Vue d'ensemble: interventions/index.md
      - Fiche papier A4: interventions/fiche-papier.md
  - Projets:
      - Vue d'ensemble: projects/index.md
      - PRO-001 — Rangement des tuyaux: projects/PRO-001-gestion-tuyaux-arrosage.md
  - Schémas:
      - Vue d'ensemble: schemas/index.md
  - Décisions:
      - Vue d'ensemble: decisions/index.md
  - Relevé terrain: releve-terrain.md
  - Gouvernance:
      - Principes: gouvernance.md
      - Roadmap: ROADMAP.md
      - GitHub Pages: GITHUB_PAGES.md
