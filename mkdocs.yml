site_name: TennisMaintenance
site_description: Référentiel technique de maintenance de la structure tennis
site_url: https://simokes.github.io/tennismaintenance/
repo_url: https://github.com/Simokes/tennismaintenance
repo_name: Simokes/tennismaintenance
edit_uri: edit/main/docs/

# Durcissement de la validation : ces contrôles, en INFO par défaut, sont
# remontés en WARNING. Combinés à `mkdocs build --strict` (CI), un lien non
# reconnu ou une page absente de la navigation fait désormais ÉCHOUER le build.
validation:
  nav:
    omitted_files: warn      # page dans docs/ mais absente du nav → warning
    not_found: warn          # entrée de nav pointant vers un fichier absent → warning
  links:
    not_found: warn          # lien interne cassé → warning
    unrecognized_links: warn # lien relatif non résolu (ex. répertoire sans index.md) → warning

plugins:
  - search:
      lang: fr

theme:
  name: material
  language: fr
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/theme.css
  - stylesheets/print.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.snippets:      # inclusion des fiches de relevé (source unique à la racine)
      base_path:
        - .
      check_paths: true     # échoue si une source incluse est absente

nav:
  - Accueil: index.md
  - Terrain:
      - Sites & terrains:
          - sites/index.md
          - La Pastorale:
              - sites/site-1/index.md
              - Tous les terrains: terrains/index.md
              - Terrain 1: terrains/T01.md
              - Terrain 2: terrains/T02.md
              - Terrain 3: terrains/T03.md
              - Terrain 4: terrains/T04.md
              - Terrain 5: terrains/T05.md
              - Terrain 6: terrains/T06.md
          - Le Kalisté:
              - sites/site-2/index.md
              - Terrain 7 — Gazon synthétique: sites/site-2/T07.md
              - Terrain 8 — Gazon synthétique: sites/site-2/T08.md
              - Terrain 9 — Dur: sites/site-2/T09.md
              - Terrain 10 — Dur: sites/site-2/T10.md
              - Terrain 11 — Dur: sites/site-2/T11.md
      - Accès:
